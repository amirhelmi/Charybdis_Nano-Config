# right conf — central side
# --- General Pointing Config ---
CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y
CONFIG_ZMK_EXT_POWER=y

# --- PMW3610 Sensor Settings ---
CONFIG_PMW3610_ALT=y
CONFIG_PMW3610_ALT_SMART_ALGORITHM=y
CONFIG_PMW3610_ALT_REPORT_INTERVAL_MIN=12

# --- Orientation ---
# Now set via devicetree properties (swap-xy, invert-x, invert-y)
# in boards/shields/charybdis/charybdis_3610.dtsi

# --- Power & Performance ---
CONFIG_PMW3610_ALT_REST1_SAMPLE_TIME_MS=12
CONFIG_PMW3610_ALT_REST2_SAMPLE_TIME_MS=100
CONFIG_PMW3610_ALT_REST3_SAMPLE_TIME_MS=300
CONFIG_PMW3610_ALT_RUN_DOWNSHIFT_TIME_MS=3000
CONFIG_PMW3610_ALT_REST1_DOWNSHIFT_TIME_MS=30000

# --- Central-only: Battery proxy (right is central) ---
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# --- Power Management for Nice!Nano ---
CONFIG_ZMK_EXT_POWER=y
