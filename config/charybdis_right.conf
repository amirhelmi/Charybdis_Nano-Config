# right conf
# --- General Pointing Config ---
CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y
CONFIG_ZMK_EXT_POWER=y

# --- PMW3610 Sensor Settings ---
CONFIG_PMW3610_ALT=y
CONFIG_PMW3610_ALT_SMART_ALGORITHM=y
CONFIG_PMW3610_ALT_REPORT_INTERVAL_MIN=12

# --- Orientation ---
# NOTE: CONFIG_PMW3610_ALT_SWAP_XY, INVERT_X, INVERT_Y are deprecated.
# Orientation is now set via devicetree properties (swap-xy, invert-x, invert-y)
# in boards/shields/charybdis/charybdis_3610.dtsi

# --- Power & Performance ---
# Lower sample time = smoother tracking.
# 10-20ms is good for REST1 (diminished lag when waking)
CONFIG_PMW3610_ALT_REST1_SAMPLE_TIME_MS=12
CONFIG_PMW3610_ALT_REST2_SAMPLE_TIME_MS=100
CONFIG_PMW3610_ALT_REST3_SAMPLE_TIME_MS=300

# How long to stay in high-performance mode before slowing down
CONFIG_PMW3610_ALT_RUN_DOWNSHIFT_TIME_MS=3000
CONFIG_PMW3610_ALT_REST1_DOWNSHIFT_TIME_MS=30000

# --- Stability Buffers ---
# Give the peripheral extra memory to handle sensor data + BT comms
CONFIG_ZMK_SPLIT_BLE_PERIPHERAL_STACK_SIZE=2048

# --- Radio Timing ---
# Stay "on-air" long enough to flush the sensor data buffer
CONFIG_BT_CTLR_SDC_MAX_CONN_EVENT_LEN_DEFAULT=7500

# --- Power Management for Nice!Nano ---
# Helps prevent voltage drops when the sensor wakes up rapidly
CONFIG_ZMK_EXT_POWER=y
