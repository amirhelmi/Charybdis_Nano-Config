# --- General Pointing Config ---
CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_PMW3610_ALT=y
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y

# --- Central-only: Battery proxy (right is central) ---
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=n
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# --- Power Management for Nice!Nano ---
CONFIG_ZMK_EXT_POWER=y

# --- Connectivity & Stability ---
# Boost signal strength for the inter-side connection
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

