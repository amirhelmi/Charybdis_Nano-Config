# right conf — central side
# --- General Pointing Config ---
CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y

# --- Native PMW3610 Sensor Settings (Zephyr 4.1) ---
CONFIG_PMW3610=y
# High performance mode for the trackball
CONFIG_PMW3610_SMART_ALGORITHM=y

# --- Central-only: Battery proxy (right is central) ---
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# --- Power Management for Nice!Nano ---
CONFIG_ZMK_EXT_POWER=y
# Help with Bluetooth stability on some Windows/Intel chips
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y



# Set the reporting frequency (12ms is roughly 83Hz, good for balance)
# Lower values (e.g., 8) increase polling but consume more battery.
CONFIG_PMW3610_REPORT_INTERVAL_MIN=12

# --- Power Management (Native Driver) ---
# These define how quickly the sensor drops into low-power modes
CONFIG_PMW3610_REST1_SAMPLE_TIME_MS=12
CONFIG_PMW3610_REST2_SAMPLE_TIME_MS=100
CONFIG_PMW3610_REST3_SAMPLE_TIME_MS=300
CONFIG_PMW3610_RUN_DOWNSHIFT_TIME_MS=3000
