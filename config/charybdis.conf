##################
##  Main Config ##
##################

CONFIG_ZMK_BLE_PASSKEY_ENTRY=y

## Bluetooth Stability
CONFIG_ZMK_BLE=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
# Changed to 'n' to avoid common Windows/macOS handshake issues
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n
# This is highly recommended for modern ZMK stability
CONFIG_ZMK_BLE_EXPERIMENTAL_FEATURES=y

## Connection Timing (Conservative values for stability)
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12

## Power Management 
CONFIG_ZMK_SLEEP=n
CONFIG_ZMK_IDLE_TIMEOUT=30000

## Battery & Macros
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_BEHAVIORS_QUEUE_SIZE=512

## Mouse & Performance
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=3
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=7
