##################
##  Main Config ##
##################

## Bluetooth Stability & Connection Management
CONFIG_ZMK_BLE=y
CONFIG_ZMK_BLE_PASSKEY_ENTRY=y

# Enable experimental BLE features for better split stability
CONFIG_ZMK_BLE_EXPERIMENTAL_FEATURES=y

# Boost signal strength
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Relaxed intervals help prevent the "typing crash" by allowing radio recovery
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=12
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=24

# BLE buffers — essential headroom for trackball and typing data
CONFIG_BT_BUF_EVT_RX_COUNT=33
CONFIG_BT_BUF_ACL_TX_SIZE=69
CONFIG_BT_BUF_ACL_TX_COUNT=32
CONFIG_BT_L2CAP_TX_BUF_COUNT=32
CONFIG_BT_BUF_ACL_RX_SIZE=69

# Disable problematic features for Windows/Intel/macOS chips
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n

## Power Management
CONFIG_ZMK_SLEEP=n
CONFIG_ZMK_IDLE_TIMEOUT=30000

## Battery & Macros
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_BEHAVIORS_QUEUE_SIZE=512

## Mouse & Performance
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=3
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=7

# Input Processing (Prevents movement data drops)
CONFIG_ZMK_INPUT_PROCESSOR_RESERVE_FRAMES=4
CONFIG_ZMK_INPUT_PROCESSOR_PRIORITY=1

## CRITICAL: Stack Sizes for Zephyr 4.1 Stability
# Prevents kernel panics during high-speed typing and trackball use
CONFIG_MAIN_STACK_SIZE=16384
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=16384
CONFIG_ZMK_INPUT_THREAD_STACK_SIZE=8192